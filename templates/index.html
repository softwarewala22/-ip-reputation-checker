<!DOCTYPE html>
<html>
<head>
    <title>IP Reputation Checker</title>

    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: Arial;
            margin: 0;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: #020617;
        }

        .container {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            margin: 60px auto;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 80%;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .result {
            margin-top: 20px;
            text-align: left;
        }

        .card {
            background: #020617;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .label {
            color: #38bdf8;
        }

        .badge {
            padding: 3px 8px;
            border-radius: 5px;
        }

        .safe {
            background: green;
        }

        .risk {
            background: red;
        }

        .footer {
    margin-top: 40px;
    padding: 15px;
    background: #020617;
    color: #94a3b8;
    font-size: 14px;
    text-align: center;
    border-top: 1px solid #1e293b;
}

.malicious {
    color: red;
    font-weight: bold;
}

.suspicious {
    color: orange;
    font-weight: bold;
}

.safe {
    color: lightgreen;
    font-weight: bold;
}

.vt-container {
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #1e293b;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

.vt-container h3 {
    margin-top: 0;
    margin-bottom: 10px;
    color: #38bdf8;
}

.vt-container {
    background: linear-gradient(145deg, #020617, #0f172a);
}
    </style>
</head>

<body>

<div class="topbar">
    <div>🔐 IP Tool</div>
    <div>Your IP: <span id="myIP">Loading...</span></div>
</div>

<div class="container">
    <h2>🔍 IP Reputation Checker</h2>

    <form onsubmit="checkIP(); return false;">
    <input type="text" id="ipInput" placeholder="Enter IP">
    <br><br>
    <button type="submit">Check</button>
</form>


    <div class="error" id="errorMsg"></div>

    <div class="result" id="resultBox" style="display:none;">
        <div class="card"><span class="label">IP:</span> <span id="ip"></span></div>
        <!-- <div class="card"><span class="label">Type:</span> <span id="type"></span></div> -->
        <div class="card"><span class="label">Risk Score:</span> <span id="score"></span></div>

        <div class="card">
            <span class="label">Status:</span>
            <span id="status" class="badge"></span>
        </div>

        <div class="card"><span class="label">ISP:</span> <span id="isp"></span></div>
        <div class="card"><span class="label">Hostname:</span> <span id="hostname"></span></div>

        <div class="card"><span class="label">Usage:</span> <span id="usage"></span></div>
         <div class="card"><span class="label">Country:</span> <span id="country"></span></div>
        <!-- <div class="card"><span class="label">Reports:</span> <span id="reports"></span></div> -->
        <div class="card"><span class="label">TOR:</span> <span id="tor"></span></div>
        <div class="card"><span class="label">Whitelisted:</span> <span id="whitelist"></span></div>
    </div>
</div>

<!-- VT BLOCK -->
<div id="vtBox" style="display:none; width: 300px; margin-top: 20px;">

    <!-- 🔥 MAIN VT CARD -->
    <div class="vt-container">

        <h3>VirusTotal</h3>

        <div class="card">
            <span class="label">IP:</span>
            <span id="vt_ip"></span>
        </div>

        <div class="card">
            <span class="label">VT Score:</span>
            <span id="vt_score"></span>
        </div>

        <div class="card">
            <span class="label">Status:</span>
            <span id="vt_status"></span>
        </div>

        <div class="card">
            <span class="label">Flagged By:</span>
            <ul id="vt_flagged"></ul>
        </div>

    </div>

</div>

<script>
// 🔹 Get your IP
fetch("https://api.ipify.org?format=json")
.then(res => res.json())
.then(data => {
    document.getElementById("myIP").innerText = data.ip;
});

// 🔹 Simple frontend validation
// function isValidIP(ip) {
//     return ip.includes('.') || ip.includes(':');
// }

function isValidIP(ip) {

    // 🔹 IPv4 validation
    const ipv4Parts = ip.split(".");
    if (ipv4Parts.length === 4) {
        let valid = ipv4Parts.every(part => {
            let num = Number(part);
            return part !== "" && num >= 0 && num <= 255 && /^\d+$/.test(part);
        });
        if (valid) return true;
    }

    // 🔹 IPv6 validation (logic based)
    if (ip.includes(":")) {

        // only one "::" allowed
        if ((ip.match(/::/g) || []).length > 1) return false;

        let parts = ip.split(":");

        // handle compressed (::)
        if (ip.includes("::")) {
            // remove empty parts caused by ::
            parts = parts.filter(p => p !== "");
        }

        // max 8 groups
        if (parts.length > 8) return false;

        // each group 1–4 hex chars
        let valid = parts.every(part => /^[0-9a-fA-F]{1,4}$/.test(part));

        return valid;
    }

    return false;
}

// 🔥 MAIN FUNCTION
async function checkIP() {
    let ip = document.getElementById("ipInput").value;
    let errorBox = document.getElementById("errorMsg");

    errorBox.innerText = "";
    document.getElementById("resultBox").style.display = "none";

    if (!ip) {
        errorBox.innerText = "⚠️ Enter IP";
        return;
    }

    if (!isValidIP(ip)) {
        errorBox.innerText = "❌ Invalid IP format";
        return;
    }

    try {
        let res = await fetch("/check_ip", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ ip: ip })
        });

        let data = await res.json();

        if (!res.ok) {
            errorBox.innerText = data.error;
            return;
        }

        document.getElementById("resultBox").style.display = "block";

        document.getElementById("ip").innerText = data.ip;
        // document.getElementById("type").innerText = data.ip.includes(":") ? "IPv6" : "IPv4";
        document.getElementById("score").innerText = data.risk_score;
        document.getElementById("country").innerText = data.country;
        document.getElementById("isp").innerText = data.isp;  
        console.log("HOSTNAMES:", data.hostnames);

        let hostnameElement = document.getElementById("hostname");

            if (Array.isArray(data.hostnames)) {
                if (data.hostnames.length > 0) {
                    hostnameElement.innerText = data.hostnames.join(", ");
                } else {
                    hostnameElement.innerText = "No Hostname Found";
                }
            } else {
                hostnameElement.innerText = "Invalid Data";
            }

        document.getElementById("usage").innerText = data.usage || "N/A";
        // document.getElementById("reports").innerText = data.total_reports || 0;
        document.getElementById("tor").innerText = data.is_tor ? "Yes" : "No";
        document.getElementById("whitelist").innerText = data.is_whitelisted ? "Yes" : "No";

        let status = document.getElementById("status");

        if (data.risk_score < 20) {
            status.innerText = "SAFE";
            status.className = "badge safe";
        } else {
            status.innerText = "RISKY";
            status.className = "badge risk";
        }

        document.getElementById("vtBox").style.display = "block";

// ✅ IP show
document.getElementById("vt_ip").innerText = data.ip;

// ✅ Score
document.getElementById("vt_score").innerText =
    `${data.vt.flagged_total}/${data.vt.total}`;

// ✅ STATUS LOGIC
let vtStatus = document.getElementById("vt_status");

if (data.vt.flagged_total === 0) {
    vtStatus.innerText = "SAFE";
    vtStatus.className = "safe";
}
else if (data.vt.flagged_total < 3) {
    vtStatus.innerText = "SUSPICIOUS";
    vtStatus.className = "suspicious";
}
else {
    vtStatus.innerText = "MALICIOUS";
    vtStatus.className = "malicious";
}

// ✅ VENDOR LIST LINE-BY-LINE
let list = document.getElementById("vt_flagged");
list.innerHTML = "";

if (data.vt.vendors.length > 0) {
    data.vt.vendors.forEach(vendor => {
        let li = document.createElement("li");
        li.innerText = vendor;
        list.appendChild(li);
    });
} else {
    let li = document.createElement("li");
    li.innerText = "None";
    list.appendChild(li);
}

    } catch (err) {
    console.error("🔥 JS ERROR:", err);
    errorBox.innerText = "Server Error";
     }
}
</script>

<footer class="footer">
    <p>© 2026 IP Reputation Checker | Built by Karan</p>
    <p>
        Data Sources: Public Threat Intel
    </p>
</footer>

</body>
</html>
